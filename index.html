<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Igreja Presbiteriana Chácara Parreiral</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: #0f2209;
    background-image: radial-gradient(ellipse at 20% 20%, #1a3d0a55 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 80%, #0a2205 0%, transparent 60%);
    min-height: 100vh;
    font-family: 'Lato', sans-serif;
    color: #EAF9E1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .wrap {
    text-align: center;
    animation: fadeUp 0.8s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .logo {
    width: 110px;
    height: 110px;
    object-fit: contain;
    margin-bottom: 2rem;
    animation: pulse 3s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.05); }
  }

  .church-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 600;
    color: #EAF9E1;
    line-height: 1.3;
    margin-bottom: 0.5rem;
  }

  .location {
    font-size: 0.8rem;
    color: #6a9a5a;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
  }

  .divider {
    width: 40px;
    height: 1px;
    background: #2d5a1b;
    margin: 0 auto 2.5rem;
  }

  .construction {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 1.1rem;
    color: #a8c89a;
    margin-bottom: 0.75rem;
  }

  .construction-sub {
    font-size: 0.85rem;
    color: #6a9a5a;
    line-height: 1.7;
  }

  .verse {
    margin-top: 3rem;
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: 0.82rem;
    color: #4a7a3a;
    line-height: 1.7;
  }
</style>
</head>
<body>
<div class="wrap">
  <img src="/Imagens/Logos//branco-vertical-vertical.png" alt="Logo IPBCP" class="logo">
  <h1 class="church-name">Presbiteriana<br>Chácara Parreiral</h1>
  <p class="location">Serra — Espírito Santo</p>
  <div class="divider"></div>
  <p class="construction">Site em construção</p>
  <p class="construction-sub">Em breve, mais novidades por aqui.</p>
  <p class="verse">"Amai-vos uns aos outros com amor fraternal." — Rm 12.10</p>
</div>
</body>
</html>
