<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda — Presbiteriana Chácara Parreiral</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --verde-escuro: #0f2209; --verde-medio: #1a3d0a; --verde-card: #162e0a;
    --verde-borda: #2d5a1b; --verde-hover: #3a7a22; --vermelho-uva: #c0392b;
    --texto-claro: #EAF9E1; --texto-muted: #a8c89a; --texto-hint: #6a9a5a;
  }
  html { scroll-behavior: smooth; }
  body { font-family: 'Lato', sans-serif; background: #f4f6f2; color: #1a1a1a; min-height: 100vh; }

  .hero {
    background-color: var(--verde-escuro);
    background-image: radial-gradient(ellipse at 15% 50%, rgba(58,122,34,0.18) 0%, transparent 55%),
                      radial-gradient(ellipse at 85% 20%, rgba(10,34,5,0.6) 0%, transparent 55%);
    padding: 2rem 1.5rem 2rem; text-align: center;
    position: sticky; top: 0; z-index: 10;
    transition: padding 0.4s ease, opacity 0.4s ease;
  }
  .hero.scrolled { padding: 0.6rem 1.5rem; }
  .hero.hidden { opacity: 0; padding: 0; pointer-events: none; max-height: 0; overflow: hidden; }
  .hero-logo { width: 52px; height: 52px; object-fit: contain; margin-bottom: 0.75rem;
    animation: floatIn 1s ease both, pulse 4s ease-in-out 1s infinite;
    transition: width 0.4s, height 0.4s, margin 0.4s; }
  .hero.scrolled .hero-logo { width: 28px; height: 28px; margin-bottom: 0.25rem; }
  .hero-title { font-family: 'Playfair Display', serif; font-size: clamp(1.1rem,3.5vw,1.4rem);
    font-weight: 600; color: var(--texto-claro); line-height: 1.2; margin-bottom: 0.3rem;
    transition: font-size 0.4s; }
  .hero.scrolled .hero-title { font-size: 0.88rem; }
  .hero-divider { width: 24px; height: 1px; background: var(--verde-borda);
    margin: 0.5rem auto 0.75rem; transition: opacity 0.3s, margin 0.3s, max-height 0.3s; max-height: 20px; }
  .hero.scrolled .hero-divider { opacity: 0; margin: 0; max-height: 0; }
  .hero-verse { font-family: 'Playfair Display', serif; font-style: italic;
    font-size: 0.82rem; color: var(--texto-muted); line-height: 1.6;
    max-width: 320px; margin: 0 auto;
    transition: opacity 0.3s, max-height 0.3s; max-height: 80px; overflow: hidden; }
  .hero.scrolled .hero-verse { opacity: 0; max-height: 0; }
  .hero-verse span { display: block; font-size: 0.72rem; color: var(--texto-hint); margin-top: 0.25rem; font-style: normal; }

  @keyframes floatIn { from { opacity: 0; transform: translateY(-16px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.04); } }

  .tabs { display: flex; background: #fff; border-bottom: 1px solid #e0e8d8; }
  .tab { flex: 1; padding: 14px; text-align: center; font-size: 13px; font-weight: 700;
    color: #999; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; }
  .tab.active { color: #1a3d0a; border-bottom-color: #3a7a22; }

  .content { max-width: 560px; margin: 0 auto; padding: 16px 16px 60px; }

  .legend { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .legend-item { display: flex; align-items: center; gap: 4px; font-size: 11px; color: #555; }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }

  .nav-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .nav-btn { background: #f0f7eb; border: 1px solid #c8e0b4; border-radius: 8px;
    padding: 6px 14px; font-size: 13px; color: #3a7a22; cursor: pointer; font-weight: 700; }
  .nav-title { font-family: 'Playfair Display', serif; font-size: 16px; color: #1a1a1a; font-weight: 500; }

  .week-strip { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-bottom: 16px; }
  .week-strip-day { text-align: center; cursor: pointer; }
  .strip-label { font-size: 10px; color: #999; text-transform: uppercase; font-weight: 700; margin-bottom: 4px; }
  .strip-num { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 13px; font-weight: 700; color: #555; margin: 0 auto; }
  .strip-num.today { background: #3a7a22; color: #fff; }
  .strip-num.has-event { border: 2px solid #3a7a22; color: #3a7a22; }
  .strip-num.today.has-event { background: #3a7a22; color: #fff; }
  .strip-num.selected { background: #1a3d0a; color: #fff; }

  .day-title { font-family: 'Playfair Display', serif; font-size: 17px; color: #1a1a1a; margin-bottom: 12px; font-weight: 500; }
  .event-item { background: #fff; border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
    border-left: 4px solid #3a7a22; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
  .event-item.culto { border-left-color: #c0392b; }
  .event-item.pgd { border-left-color: #854F0B; }
  .event-item.escola { border-left-color: #185FA5; }
  .event-item-title { font-family: 'Playfair Display', serif; font-size: 14px; color: #1a1a1a; font-weight: 500; margin-bottom: 2px; }
  .event-item-time { font-size: 12px; color: #666; }
  .event-item-sub { font-size: 11px; color: #999; margin-top: 2px; }
  .event-item-badge { display: inline-block; font-size: 10px; background: #f0f7eb;
    border: 1px solid #c8e0b4; border-radius: 10px; padding: 2px 8px;
    color: #3a7a22; margin-top: 4px; font-weight: 700; }
  .event-item-badge.culto { background: #fef0ee; border-color: #f5c4b3; color: #993C1D; }
  .event-item-badge.pgd { background: #FAEEDA; border-color: #FAC775; color: #633806; }
  .event-item-badge.escola { background: #E6F1FB; border-color: #B5D4F4; color: #0C447C; }
  .no-events { text-align: center; padding: 24px; color: #aaa; font-size: 13px; font-style: italic; }

  .week-headers { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; margin-bottom: 4px; }
  .week-header { text-align: center; font-size: 10px; font-weight: 700; color: #999; letter-spacing: 0.5px; padding: 4px 0; text-transform: uppercase; }
  .month-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
  .month-day { background: #fff; border: 1px solid #e8eee4; border-radius: 8px;
    padding: 4px 3px; min-height: 60px; cursor: pointer; transition: border-color 0.2s; }
  .month-day:hover { border-color: #3a7a22; }
  .month-day.today { border-color: #3a7a22; background: #f0f7eb; }
  .month-day.other-month { opacity: 0.35; }
  .day-num { font-size: 11px; font-weight: 700; color: #555; text-align: center; margin-bottom: 2px; }
  .month-day.today .day-num { color: #3a7a22; }
  .event-pill { font-size: 8px; background: #1a3d0a; color: #EAF9E1; border-radius: 3px;
    padding: 1px 3px; margin: 1px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.4; }
  .event-pill.culto { background: #c0392b; }
  .event-pill.pgd { background: #854F0B; }
  .event-pill.escola { background: #185FA5; }

  .footer { text-align: center; padding: 1.5rem; background: var(--verde-escuro); color: var(--texto-hint); font-size: 0.75rem; }
</style>
<script src="/nav.js"></script>
</head>
<body>

<section class="hero" id="hero">
  <img src="/Imagens/Logos/logotipo-branco.png" alt="Logo" class="hero-logo">
  <h1 class="hero-title">Presbiteriana<br>Chácara Parreiral</h1>
  <div class="hero-divider"></div>
  <p class="hero-verse">
    "Oh! Como é bom e agradável viverem unidos os irmãos."
    <span>— Salmos 133.1</span>
  </p>
</section>

<div class="tabs">
  <div class="tab active" onclick="switchTab('semana')">Semana</div>
  <div class="tab" onclick="switchTab('mes')">Mês</div>
</div>

<div class="content">
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#c0392b"></div> Culto</div>
    <div class="legend-item"><div class="legend-dot" style="background:#185FA5"></div> Escola Bíblica</div>
    <div class="legend-item"><div class="legend-dot" style="background:#1a3d0a"></div> Oração</div>
    <div class="legend-item"><div class="legend-dot" style="background:#854F0B"></div> PGDs</div>
  </div>

  <div id="semana-view">
    <div class="nav-row">
      <button class="nav-btn" onclick="changeWeek(-1)">&#8592;</button>
      <span class="nav-title" id="week-title"></span>
      <button class="nav-btn" onclick="changeWeek(1)">&#8594;</button>
    </div>
    <div class="week-strip" id="week-strip"></div>
    <div id="day-events"></div>
  </div>

  <div id="mes-view" style="display:none;">
    <div class="nav-row">
      <button class="nav-btn" onclick="changeMonth(-1)">&#8592;</button>
      <span class="nav-title" id="month-title"></span>
      <button class="nav-btn" onclick="changeMonth(1)">&#8594;</button>
    </div>
    <div class="week-headers">
      <div class="week-header">Dom</div><div class="week-header">Seg</div>
      <div class="week-header">Ter</div><div class="week-header">Qua</div>
      <div class="week-header">Qui</div><div class="week-header">Sex</div>
      <div class="week-header">Sab</div>
    </div>
    <div class="month-grid" id="month-grid"></div>
  </div>
</div>



<script>
  const today = new Date();
  today.setHours(0,0,0,0);
  let currentWeekStart = new Date(today);
  currentWeekStart.setDate(today.getDate() - today.getDay());
  let currentMonth = new Date(today.getFullYear(), today.getMonth(), 1);
  let selectedDay = new Date(today);

  const PGD_BASE = new Date(2026, 3, 23);

  function isPGD(date) {
    const d = new Date(date.getFullYear(), date.getMonth(), date.getDate());
    const diff = Math.round((d - PGD_BASE) / (1000*60*60*24));
    return date.getDay() === 4 && diff >= 0 && diff % 14 === 0;
  }

  function getEvents(date) {
    const ev = [];
    const dow = date.getDay();
    if (dow === 0) {
      ev.push({title:'Escola Bíblica', time:'18h00', type:'escola', badge:'Semanal'});
      ev.push({title:'Culto de Adoração', time:'19h30', type:'culto', badge:'Semanal'});
    }
    if (dow === 2) ev.push({title:'Reunião de Oração', time:'19h30', type:'oracao', badge:'Semanal'});
    if (isPGD(date)) ev.push({title:'PGDs', time:'19h30', type:'pgd', badge:'Quinzenal', sub:'Pequeno Grupo Discipuladores'});
    return ev;
  }

  function fmtShort(d) { return d.toLocaleDateString('pt-BR',{day:'numeric',month:'short'}); }
  const MONTHS = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const DAYS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sab'];

  function renderWeek() {
    const start = new Date(currentWeekStart);
    const end = new Date(start); end.setDate(start.getDate()+6);
    document.getElementById('week-title').textContent = fmtShort(start) + ' – ' + fmtShort(end);
    const strip = document.getElementById('week-strip');
    strip.innerHTML = '';
    for (let i=0; i<7; i++) {
      const d = new Date(start); d.setDate(start.getDate()+i);
      const evs = getEvents(d);
      const isToday = d.toDateString()===today.toDateString();
      const isSel = d.toDateString()===selectedDay.toDateString();
      const hasEv = evs.length>0;
      let cls = 'strip-num';
      if (isSel) cls += ' selected';
      else if (isToday && hasEv) cls += ' today has-event';
      else if (isToday) cls += ' today';
      else if (hasEv) cls += ' has-event';
      strip.innerHTML += `<div class="week-strip-day" onclick="selectDay(${d.getFullYear()},${d.getMonth()},${d.getDate()})">
        <div class="strip-label">${DAYS[d.getDay()]}</div>
        <div class="${cls}">${d.getDate()}</div>
      </div>`;
    }
    renderDayEvents();
  }

  function selectDay(y,m,d) {
    selectedDay = new Date(y,m,d);
    renderWeek();
  }

  function renderDayEvents() {
    const evs = getEvents(selectedDay);
    const container = document.getElementById('day-events');
    const str = selectedDay.toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'});
    const cap = str.charAt(0).toUpperCase()+str.slice(1);
    if (!evs.length) {
      container.innerHTML = `<div class="day-title">${cap}</div><div class="no-events">Nenhum evento neste dia.</div>`;
      return;
    }
    let html = `<div class="day-title">${cap}</div>`;
    evs.forEach(ev => {
      html += `<div class="event-item ${ev.type}">
        <div class="event-item-title">${ev.title}</div>
        <div class="event-item-time">${ev.time}</div>
        ${ev.sub ? `<div class="event-item-sub">${ev.sub}</div>` : ''}
        <span class="event-item-badge ${ev.type}">${ev.badge}</span>
      </div>`;
    });
    container.innerHTML = html;
  }

  function changeWeek(dir) {
    currentWeekStart.setDate(currentWeekStart.getDate() + dir*7);
    selectedDay = new Date(currentWeekStart);
    renderWeek();
  }

  function renderMonth() {
    document.getElementById('month-title').textContent = MONTHS[currentMonth.getMonth()] + ' ' + currentMonth.getFullYear();
    const grid = document.getElementById('month-grid');
    grid.innerHTML = '';
    const firstDay = new Date(currentMonth.getFullYear(), currentMonth.getMonth(), 1);
    let start = new Date(firstDay); start.setDate(1 - firstDay.getDay());
    for (let i=0; i<42; i++) {
      const d = new Date(start); d.setDate(start.getDate()+i);
      if (i>=35 && d.getMonth()!==currentMonth.getMonth()) break;
      const evs = getEvents(d);
      const isToday = d.toDateString()===today.toDateString();
      const otherM = d.getMonth()!==currentMonth.getMonth();
      let cls = 'month-day'+(isToday?' today':'')+(otherM?' other-month':'');
      let pills = evs.map(ev=>`<div class="event-pill ${ev.type}">${ev.title.split(' ')[0]}</div>`).join('');
      grid.innerHTML += `<div class="${cls}" onclick="goToDay(${d.getFullYear()},${d.getMonth()},${d.getDate()})">
        <div class="day-num">${d.getDate()}</div>${pills}
      </div>`;
    }
  }

  function goToDay(y,m,d) {
    selectedDay = new Date(y,m,d);
    currentWeekStart = new Date(y,m,d);
    currentWeekStart.setDate(d - new Date(y,m,d).getDay());
    switchTab('semana');
  }

  function changeMonth(dir) {
    currentMonth.setMonth(currentMonth.getMonth()+dir);
    renderMonth();
  }

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='semana')||(i===1&&tab==='mes')));
    document.getElementById('semana-view').style.display = tab==='semana'?'block':'none';
    document.getElementById('mes-view').style.display = tab==='mes'?'block':'none';
    if (tab==='mes') renderMonth();
  }

  const hero = document.getElementById('hero');
  window.addEventListener('scroll', () => {
    const s = window.scrollY;
    if (s > 100) { hero.classList.add('hidden'); hero.classList.remove('scrolled'); }
    else if (s > 20) { hero.classList.add('scrolled'); hero.classList.remove('hidden'); }
    else { hero.classList.remove('scrolled','hidden'); }
  }, { passive: true });

  renderWeek();
</script>
</body>
</html>
